name: Deploy to Vercel & Render

on:
  push:
    branches: [main, deploy]
  workflow_dispatch:

jobs:
  # ✅ Run tests FIRST (best practice)
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # Backend
      - name: Install Backend Dependencies
        working-directory: server
        run: npm ci

      - name: Run Backend Tests
        working-directory: server
        run: npm test || echo "No backend tests"

      # Frontend
      - name: Install Frontend Dependencies
        working-directory: client
        run: npm ci

      - name: Run Frontend Tests
        working-directory: client
        run: npm test || echo "No frontend tests"

  # ✅ Deploy Backend (only if tests pass)
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: test   # 🔥 important

    steps:
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "Backend deployment triggered"
          else
            echo "RENDER_DEPLOY_HOOK not set"
          fi

  # ✅ Deploy Frontend (only if tests pass)
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: test   # 🔥 important

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: client
        run: |
          vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}