services:
  - type: web
    name: connectors-backend
    runtime: node

    buildCommand: npm install
    startCommand: npm start

    plan: free
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: MONGO_URI
        sync: false

      - key: CLIENT_URL
        value: https://your-frontend.vercel.app

      - key: JWT_SECRET
        sync: false

      - key: HUGGINGFACE_API_KEY
        sync: false

    healthCheckPath: /health

    disk:
      name: render-disk
      mountPath: /mnt/data
      sizeGB: 1